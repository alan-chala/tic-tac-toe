<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Game</title>
    <meta
      name="description"
      content="A simple Tic Tac Toe game built with HTML, CSS, and JavaScript. Play against a friend."
    />
    <meta
      name="keywords"
      content="Tic Tac Toe, Game, HTML, CSS, JavaScript, Two Player Game"
    />
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body>
    <main class="main">
      <div class="start-game-container" aria-hidden="false">
        <h1>Tic Tac Toe Game</h1>
        <p>
          Welcome to the Tic Tac Toe game! Click the button below to start
          playing against a friend.
        </p>
        <button id="startGame" aria-label="Start the game button">Start the Game</button>
      </div>

      <section class="game">
        <div>
          <h2>Tic Tac Toe</h2>
        </div>

        <div class="show-turn">
          <span>X</span>
          <span>O</span>
        </div>

        <div class="game-board">
          <div class="cell" data-index="0"></div>
          <div class="cell" data-index="1"></div>
          <div class="cell" data-index="2"></div>
          <div class="cell" data-index="3"></div>
          <div class="cell" data-index="4"></div>
          <div class="cell" data-index="5"></div>
          <div class="cell" data-index="6"></div>
          <div class="cell" data-index="7"></div>
          <div class="cell" data-index="8"></div>
        </div>

        <div class="game-buttons">
          <button id="restartGame" aria-label="Restart the game button">Restart Game</button>
          <button id="quitGame" aria-label="Quit the game button">Quit Game</button>
        </div>

        <div>
          <p class="winner-message"></p>
        </div>
      </section>
    </main>

    <script src="./assets/js/index.js"></script>
  </body>
</html>
